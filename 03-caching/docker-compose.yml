services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: storeapi-db
    environment:
      MSSQL_SA_PASSWORD: "Strong@Passw0rd!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Strong@Passw0rd!" -C -Q "SELECT 1" -b || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # --- השירות החדש שהוספנו ---
  redis_cache:
    image: redis:7-alpine
    container_name: storeapi-cache
    ports:
      - "6379:6379"
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storeapi-app
    ports:
      - "5124:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ChineseOrderDB;User Id=sa;Password=Strong@Passw0rd!;TrustServerCertificate=True;"
      # הוספת מחרוזת התחברות ל-Redis (שם השרת הוא שם השירות שהגדרנו)
      Redis__ConnectionString: "redis_cache:6379"
    depends_on:
      sqlserver:
        condition: service_healthy
      # ה-API יחכה גם ל-Redis
      redis_cache:
        condition: service_started

volumes:
  sqlserver-data: